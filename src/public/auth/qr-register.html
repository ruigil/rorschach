<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register passkey — Rorschach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #03070a;
      --surface:    #060e14;
      --border:     #0d1f2d;
      --text:       #e8f6fa;
      --text-dim:   #3d6878;
      --text-mid:   #8abccc;
      --accent:     #00c4d4;
      --accent-dim: rgba(0,196,212,0.06);
      --error:      #e06030;
      --green:      #39e8a0;
      --font-ui:    'Space Grotesk', system-ui, sans-serif;
      --radius:     8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-mid);
    }
    .logo svg { width: 20px; height: 20px; color: var(--accent); }
    .icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    .icon svg { width: 26px; height: 26px; }
    .icon.ok  { background: rgba(57,232,160,0.06);  border-color: var(--green); color: var(--green); }
    .icon.err { background: rgba(224,96,48,0.07);   border-color: var(--error); color: var(--error); }
    h1  { font-size: 1rem; font-weight: 600; }
    p   { font-size: 13px; color: var(--text-mid); line-height: 1.6; }
    .sub { font-size: 11px; color: var(--text-dim); }
    .btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 12px 20px;
      width: 100%;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    a { color: var(--accent); text-decoration: none; font-size: 12px; }
    a:hover { text-decoration: underline; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.9s linear infinite; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2.5 C10.5 4.5 8.5 5.5 6.5 7 C4.8 8.2 4 9.8 4 12 C4 14.2 5 15.8 6.8 17 C8.6 18.2 10.5 19.2 12 21.5 C13.5 19.2 15.4 18.2 17.2 17 C19 15.8 20 14.2 20 12 C20 9.8 19.2 8.2 17.5 7 C15.5 5.5 13.5 4.5 12 2.5Z" fill="currentColor" opacity="0.18"/>
        <path d="M12 6.5 C11 7.8 9.5 8.8 8.2 9.8 C7 10.8 6.5 11.3 6.5 12 C6.5 12.7 7 13.2 8.2 14.2 C9.5 15.2 11 16.2 12 17.5 C13 16.2 14.5 15.2 15.8 14.2 C17 13.2 17.5 12.7 17.5 12 C17.5 11.3 17 10.8 15.8 9.8 C14.5 8.8 13 7.8 12 6.5Z" fill="currentColor" opacity="0.55"/>
        <circle cx="12" cy="12" r="1.6" fill="currentColor" opacity="0.9"/>
      </svg>
      RORSCHACH
    </div>

    <div class="icon" id="icon">
      <!-- fingerprint icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/>
        <path d="M14 13.12c0 2.38 0 6.38-1 8.88"/>
        <path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/>
        <path d="M2 12a10 10 0 0 1 18-6"/>
        <path d="M2 17c1 0 1.5-.6 1.5-1.5S4.33 14 5.5 14c1.14 0 1.5.5 1.5 1.5 0 .76.1 1.5.5 2"/>
        <path d="M8 14a5 5 0 0 1 10 0"/>
        <path d="M21 12a9.94 9.94 0 0 1-.38 2.7"/>
      </svg>
    </div>

    <div id="body-prompt">
      <h1 id="prompt-title">Create passkey</h1>
      <p style="margin-top: 0.5rem" id="prompt-desc">Save a passkey on this device to sign in quickly and securely.</p>
    </div>

    <div id="body-verifying" style="display:none">
      <h1>Creating…</h1>
      <p style="margin-top: 0.5rem; color: var(--text-dim)">Saving passkey and confirming with server</p>
    </div>

    <div id="body-ok" style="display:none">
      <h1>Passkey created!</h1>
      <p style="margin-top: 0.5rem">Your account is ready. You can close this tab —<br>the other device will continue automatically.</p>
    </div>

    <div id="body-err" style="display:none">
      <h1 id="err-title">Registration failed</h1>
      <p id="err-desc" style="margin-top: 0.5rem"></p>
    </div>

    <button class="btn" id="create-btn">Create passkey</button>
    <a href="register.html" id="back-link" style="display:none">Back to register</a>
  </div>

  <script type="module">
    import { encodeCredential, decodeRegistrationOptions } from './auth.js'

    const iconEl    = document.getElementById('icon')
    const createBtn = document.getElementById('create-btn')
    const backLink  = document.getElementById('back-link')

    function show(id) {
      for (const el of document.querySelectorAll('[id^="body-"]')) el.style.display = 'none'
      document.getElementById(id).style.display = ''
    }

    function showOk() {
      iconEl.className = 'icon ok'
      iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
      show('body-ok')
      createBtn.style.display = 'none'
    }

    function showErr(title, desc) {
      iconEl.className = 'icon err'
      iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
      document.getElementById('err-title').textContent = title
      document.getElementById('err-desc').textContent  = desc
      show('body-err')
      createBtn.style.display = 'none'
      backLink.style.display  = ''
    }

    function showVerifying() {
      iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spinner"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`
      show('body-verifying')
    }

    const challengeId = new URL(location.href).searchParams.get('c')
    if (!challengeId) {
      showErr('Invalid link', 'No challenge ID found in this URL.')
    } else {
      // Fetch registration options from server
      const optionsUrl = new URL('register/options', location.href)
      optionsUrl.searchParams.set('challenge', challengeId)
      fetch(optionsUrl)
        .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e.error ?? 'Failed to load options')))
        .then(options => {
          const phone = options.user?.name ?? ''
          document.getElementById('prompt-title').textContent = `Create passkey for ${phone}`

          show('body-prompt')
          createBtn.style.display = ''

          createBtn.addEventListener('click', async () => {
            createBtn.disabled = true
            showVerifying()
            try {
              const cred = await navigator.credentials.create({ publicKey: decodeRegistrationOptions(options) })

              const finishRes = await fetch(new URL('register/finish', location.href), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ challengeId, credential: encodeCredential(cred) }),
              })
              const finish = await finishRes.json()
              if (!finishRes.ok) { showErr('Registration failed', finish.error ?? 'The server rejected the credential.'); return }

              showOk()

            } catch (err) {
              const msg = err.name === 'NotAllowedError'    ? 'The passkey prompt was cancelled.'
                        : err.name === 'InvalidStateError'  ? 'A passkey for this device already exists.'
                        : err.name === 'SecurityError'      ? 'Origin mismatch — check that you scanned the correct QR code.'
                        : err.message || 'An unexpected error occurred.'
              showErr('Registration failed', msg)
              createBtn.disabled = false
            }
          })
        })
        .catch(err => showErr('Link expired or invalid', typeof err === 'string' ? err : 'Could not load registration data.'))
    }
  </script>
</body>
</html>
