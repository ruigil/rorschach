<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rorschach — WebSocket Console</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      background: #0e0e0e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      gap: 1rem;
    }

    h1 {
      font-size: 1rem;
      color: #569cd6;
      font-weight: normal;
    }

    h1 span { color: #6a9955; }

    #log {
      flex: 1;
      overflow-y: auto;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.75rem;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    #log .sent    { color: #dcdcaa; }
    #log .received { color: #9cdcfe; }
    #log .system  { color: #6a9955; font-style: italic; }

    form {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.8rem;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 4px;
      color: #d4d4d4;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="text"]:focus { border-color: #569cd6; }

    button {
      padding: 0.6rem 1.2rem;
      background: #264f78;
      border: 1px solid #569cd6;
      border-radius: 4px;
      color: #d4d4d4;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    button:hover { background: #37699e; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      font-size: 0.75rem;
      color: #6a9955;
    }

    #status.disconnected { color: #f44747; }
  </style>
</head>
<body>
  <h1>rorschach <span>› websocket console</span></h1>
  <div id="status">connecting…</div>
  <div id="log"></div>
  <form id="form">
    <input type="text" id="input" placeholder="type a message…" autocomplete="off" disabled />
    <button type="submit" id="send" disabled>send</button>
  </form>

  <script>
    const log    = document.getElementById('log')
    const form   = document.getElementById('form')
    const input  = document.getElementById('input')
    const send   = document.getElementById('send')
    const status = document.getElementById('status')

    function appendLog(text, cls) {
      const div = document.createElement('div')
      div.className = cls
      div.textContent = text
      log.appendChild(div)
      log.scrollTop = log.scrollHeight
    }

    function connect() {
      // Build WebSocket URL relative to the current page so it works behind reverse proxies
      const wsUrl = new URL('ws', location.href)
      wsUrl.protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
      const ws = new WebSocket(wsUrl.href)

      ws.addEventListener('open', () => {
        status.textContent = '● connected'
        status.className = ''
        input.disabled = false
        send.disabled = false
        input.focus()
        appendLog('— connected —', 'system')
      })

      ws.addEventListener('message', (e) => {
        appendLog(`← ${e.data}`, 'received')
      })

      ws.addEventListener('close', () => {
        status.textContent = '● disconnected — reconnecting…'
        status.className = 'disconnected'
        input.disabled = true
        send.disabled = true
        appendLog('— disconnected —', 'system')
        setTimeout(connect, 2000)
      })

      ws.addEventListener('error', () => {
        ws.close()
      })

      form.addEventListener('submit', (e) => {
        e.preventDefault()
        const text = input.value.trim()
        if (!text || ws.readyState !== WebSocket.OPEN) return
        ws.send(text)
        appendLog(`→ ${text}`, 'sent')
        input.value = ''
        input.focus()
      })
    }

    connect()
  </script>
</body>
</html>
