<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rorschach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="void-canvas" aria-hidden="true"></canvas>

  <header>
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 24 24" fill="none">
        <path d="M12 2.5 C10.5 4.5 8.5 5.5 6.5 7 C4.8 8.2 4 9.8 4 12 C4 14.2 5 15.8 6.8 17 C8.6 18.2 10.5 19.2 12 21.5 C13.5 19.2 15.4 18.2 17.2 17 C19 15.8 20 14.2 20 12 C20 9.8 19.2 8.2 17.5 7 C15.5 5.5 13.5 4.5 12 2.5Z" fill="currentColor" opacity="0.18"/>
        <path d="M12 6.5 C11 7.8 9.5 8.8 8.2 9.8 C7 10.8 6.5 11.3 6.5 12 C6.5 12.7 7 13.2 8.2 14.2 C9.5 15.2 11 16.2 12 17.5 C13 16.2 14.5 15.2 15.8 14.2 C17 13.2 17.5 12.7 17.5 12 C17.5 11.3 17 10.8 15.8 9.8 C14.5 8.8 13 7.8 12 6.5Z" fill="currentColor" opacity="0.55"/>
        <circle cx="12" cy="12" r="1.6" fill="currentColor" opacity="0.9"/>
      </svg>
      <span class="logo-name">RORSCHACH</span>
      <div class="logo-divider"></div>
      <span class="logo-sub" id="logo-sub">chat</span>
    </div>
    <nav class="header-nav">
      <button class="nav-link active" data-tab="chat">chat</button>
      <button class="nav-link" data-tab="config" hidden>config</button>
      <button class="nav-link" data-tab="observe" hidden>observe</button>
    </nav>
    <div class="header-end">
      <label class="mode-select-wrap" for="mode-select">
        <span>mode</span>
        <select id="mode-select" disabled>
          <option value="">loading</option>
        </select>
      </label>
      <div class="status-pill">
        <r-status-dot id="dot" status="disconnected" label="connecting…"></r-status-dot>
      </div>
      <button class="logout-btn" id="logout-btn" title="Sign out" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Chat panel ─── -->
  <div id="panel-chat" class="panel active">
    <div class="chat-main">
      <div id="messages">
        <div class="empty-state" id="empty">
          <svg class="empty-icon" width="48" height="48" viewBox="0 0 48 48" fill="none">
            <ellipse cx="24" cy="24" rx="20" ry="7" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
            <ellipse cx="24" cy="24" rx="13" ry="4.5" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
            <ellipse cx="24" cy="24" rx="7" ry="2.5" stroke="currentColor" stroke-width="0.5" opacity="0.5"/>
            <circle cx="24" cy="24" r="1.5" fill="currentColor" opacity="0.9"/>
          </svg>
          <span class="empty-title">Signal detected</span>
          <span class="empty-sub">awaiting transmission</span>
        </div>
      </div>
      <div class="chat-dock">
        <div class="input-area">
          <div id="image-previews" class="image-previews hidden"></div>
          <form id="chat-form">
            <input type="file" id="file-input" accept="image/*,audio/*,.mp3,.wav,application/pdf,.pdf" multiple style="display:none">
            <button type="button" id="attach-btn" aria-label="Attach file">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <button type="button" id="mic-btn" aria-label="Record audio">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
            <textarea
              id="input"
              placeholder="Message…"
              autocomplete="off"
              rows="1"
              disabled
            ></textarea>
            <button type="submit" id="send" disabled aria-label="Send">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
          </form>
          <p class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
        </div>
      </div>
    </div>
    <div id="plan-workspace-resizer" class="plan-workspace-resizer" role="separator" aria-orientation="vertical" aria-label="Resize plan workspace"></div>
    <aside id="plan-workspace" class="plan-workspace" aria-label="Plan workspace">
      <div class="plan-workspace-header">
        <div>
          <div class="plan-workspace-kicker">Executor</div>
          <h2 id="plan-workspace-title">Plans</h2>
        </div>
        <button id="plan-workspace-close" class="plan-workspace-close" aria-label="Close plan workspace">×</button>
      </div>
      <div id="plan-workspace-body" class="plan-workspace-body"></div>
    </aside>
  </div>

  <!-- ─── Config panel ─── -->
  <div id="panel-config" class="panel">
    <div class="config-bar">
      <r-tabs class="config-subtabs" id="config-tabs"></r-tabs>
    </div>

    <div class="config-content">
        <form id="config-form" novalidate>
          <div id="config-form-container"></div>

          <div class="form-actions">
            <button type="submit" class="btn-save">Save</button>
            <button type="button" class="btn-reset" id="reset-btn">Reset</button>
            <r-flash-message id="flash-msg"></r-flash-message>
          </div>
        </form>
      </div>
  </div>


  <!-- ─── Observe panel ─── -->
  <div id="panel-observe" class="panel">

    <div class="obs-bar">
      <r-tabs class="obs-subtabs">
        <button class="obs-subtab active" data-subtab="metrics">metrics</button>
        <button class="obs-subtab" data-subtab="topics">topics</button>
        <button class="obs-subtab" data-subtab="logs">logs</button>
        <button class="obs-subtab" data-subtab="traces">traces</button>
        <button class="obs-subtab" data-subtab="tools">tools</button>
        <button class="obs-subtab" data-subtab="memory">memory</button>
        <button class="obs-subtab" data-subtab="costs">costs</button>
      </r-tabs>
      <div class="obs-bar-end">
        <div class="metrics-summary" id="metrics-summary" style="display:none">
          <div class="summary-stat">
            <span class="summary-val" id="sum-actors">0</span>
            <span class="summary-key">actors</span>
          </div>
          <div class="summary-stat">
            <span class="summary-val" id="sum-recv">0</span>
            <span class="summary-key">recv</span>
          </div>
          <div class="summary-stat">
            <span class="summary-val" id="sum-done">0</span>
            <span class="summary-key">done</span>
          </div>
          <div class="summary-stat">
            <span class="summary-val" id="sum-fail">0</span>
            <span class="summary-key">fail</span>
          </div>
        </div>
        <div class="obs-log-controls" id="obs-log-controls" style="display:none">
          <span class="log-count" id="log-count">0 events</span>
          <button class="btn-clear" id="clear-logs">clear</button>
        </div>
        <div class="obs-traces-controls" id="obs-traces-controls" style="display:none">
          <span class="log-count" id="traces-count">0 traces</span>
          <button class="btn-clear" id="clear-traces">clear</button>
        </div>
        <div class="obs-memory-controls" id="obs-memory-controls" style="display:none">
          <span class="log-count" id="memory-stats"></span>
          <button class="btn-clear" id="memory-refresh">refresh</button>
        </div>
      </div>
    </div>

    <div id="obs-metrics" class="obs-subpanel active">
      <div class="metrics-layout">
        <div class="tree-col">
          <r-actor-tree id="actor-tree">
            <r-empty-state id="metrics-empty" variant="panel" name="monitor" text="awaiting metrics snapshot"></r-empty-state>
          </r-actor-tree>
        </div>
        <div class="detail-col">
          <r-actor-detail id="actor-detail">
            <r-empty-state variant="panel" name="eye" text="select an actor to inspect"></r-empty-state>
          </r-actor-detail>
        </div>
      </div>
    </div>

    <div id="obs-topics" class="obs-subpanel">
      <r-topic-list id="topic-list">
        <r-empty-state id="topics-empty" variant="panel" name="activity" text="awaiting metrics snapshot"></r-empty-state>
      </r-topic-list>
    </div>

    <div id="obs-traces" class="obs-subpanel">
      <r-trace-waterfall id="obs-traces-list">
        <r-empty-state id="traces-empty" variant="panel" name="waterfall" text="awaiting traces"></r-empty-state>
      </r-trace-waterfall>
    </div>

    <div id="obs-logs" class="obs-subpanel">
      <r-log-stream id="log-stream">
        <r-empty-state id="log-empty" variant="panel" name="terminal" text="awaiting log events"></r-empty-state>
      </r-log-stream>
    </div>

    <div id="obs-tools" class="obs-subpanel">
      <r-tools-list id="tools-list">
        <r-empty-state id="tools-empty" variant="panel" name="wrench" text="no tools registered"></r-empty-state>
      </r-tools-list>
    </div>

    <r-costs-table id="obs-costs" class="obs-subpanel">
      <r-empty-state id="costs-empty" variant="panel" text="no usage data yet"></r-empty-state>
      <table class="costs-table" id="costs-table" style="display:none">
        <thead>
          <tr>
            <th>role</th>
            <th>model</th>
            <th>in</th>
            <th>out</th>
            <th>ctx</th>
            <th>cost</th>
          </tr>
        </thead>
        <tbody id="costs-rows"></tbody>
        <tfoot id="costs-summary"></tfoot>
      </table>
    </r-costs-table>

    <div id="obs-memory" class="obs-subpanel">
      <r-force-graph id="memory-graph">
        <r-empty-state id="memory-empty" variant="panel" name="network" text="no graph data"></r-empty-state>
      </r-force-graph>
    </div>

  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/ocean.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script type="module" src="rorschach.js"></script>
</body>
</html>
