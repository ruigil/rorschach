<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rorschach Chat</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --user-bg: #1f6feb;
      --assistant-bg: #21262d;
      --error-bg: #3d1418;
      --notification-bg: #1c2d1f;
      --success: #3fb950;
      --danger: #f85149;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 span {
      font-size: 22px;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: var(--success);
    }

    .session-id {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.error {
      align-self: flex-start;
      background: var(--error-bg);
      border: 1px solid #f8514933;
      border-bottom-left-radius: 4px;
      color: var(--danger);
    }

    .message.notification {
      align-self: center;
      background: var(--notification-bg);
      border: 1px solid #3fb95033;
      border-radius: 8px;
      font-size: 13px;
      color: var(--success);
    }

    .message.system {
      align-self: center;
      font-size: 12px;
      color: var(--text-muted);
      background: none;
      padding: 4px 0;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      display: none;
    }

    .typing-indicator.visible {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: var(--accent);
    }

    .input-area input:disabled {
      opacity: 0.5;
    }

    .input-area button {
      padding: 10px 20px;
      background: var(--accent-dim);
      color: var(--text);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover:not(:disabled) {
      background: var(--accent);
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Scrollbar */
    .messages::-webkit-scrollbar {
      width: 6px;
    }
    .messages::-webkit-scrollbar-track {
      background: var(--bg);
    }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>🧠</span> Rorschach Chat</h1>
    <div>
      <div class="connection-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
      <div class="session-id" id="sessionId"></div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="message system">Connecting to server...</div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>

  <div class="input-area">
    <input
      type="text"
      id="messageInput"
      placeholder="Type a message..."
      disabled
      autocomplete="off"
    />
    <button id="sendButton" disabled>Send</button>
  </div>

  <script>
    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------

    let ws = null;
    let sessionId = localStorage.getItem("rorschach-session-id") || null;
    let isConnected = false;

    // -----------------------------------------------------------------------
    // DOM elements
    // -----------------------------------------------------------------------

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendButton");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const sessionIdEl = document.getElementById("sessionId");
    const typingIndicator = document.getElementById("typingIndicator");

    // -----------------------------------------------------------------------
    // UI helpers
    // -----------------------------------------------------------------------

    function addMessage(content, type = "assistant") {
      const div = document.createElement("div");
      div.className = `message ${type}`;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setConnected(connected) {
      isConnected = connected;
      statusDot.className = `status-dot ${connected ? "connected" : ""}`;
      statusText.textContent = connected ? "Connected" : "Disconnected";
      inputEl.disabled = !connected;
      sendBtn.disabled = !connected;
      if (connected) inputEl.focus();
    }

    function showTyping(show) {
      typingIndicator.className = `typing-indicator ${show ? "visible" : ""}`;
      if (show) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateSessionId(id) {
      sessionId = id;
      localStorage.setItem("rorschach-session-id", id);
      sessionIdEl.textContent = `Session: ${id.slice(0, 8)}...`;
    }

    // -----------------------------------------------------------------------
    // WebSocket connection
    // -----------------------------------------------------------------------

    function connect() {
      const wsUrl = sessionId
        ? `ws://${location.hostname}:${location.port}/ws?sessionId=${sessionId}`
        : `ws://${location.hostname}:${location.port}/ws`;

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        setConnected(true);
        addMessage("Connected to Rorschach", "system");
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          switch (data.type) {
            case "session":
              updateSessionId(data.sessionId);
              break;

            case "response":
              showTyping(false);
              addMessage(data.content, "assistant");
              inputEl.disabled = false;
              sendBtn.disabled = false;
              inputEl.focus();
              break;

            case "notification":
              addMessage(data.content, "notification");
              break;

            case "error":
              showTyping(false);
              addMessage(data.content, "error");
              inputEl.disabled = false;
              sendBtn.disabled = false;
              inputEl.focus();
              break;

            default:
              console.log("Unknown message type:", data);
          }
        } catch (err) {
          console.error("Failed to parse message:", err);
        }
      };

      ws.onclose = () => {
        setConnected(false);
        showTyping(false);
        addMessage("Disconnected. Reconnecting...", "system");
        setTimeout(connect, 3000);
      };

      ws.onerror = (err) => {
        console.error("WebSocket error:", err);
      };
    }

    // -----------------------------------------------------------------------
    // Send message
    // -----------------------------------------------------------------------

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !isConnected || !ws) return;

      // Add user message to chat
      addMessage(text, "user");
      inputEl.value = "";

      // Show typing indicator
      showTyping(true);
      inputEl.disabled = true;
      sendBtn.disabled = true;

      // Send via WebSocket
      ws.send(JSON.stringify({
        type: "chat",
        message: text,
      }));
    }

    // -----------------------------------------------------------------------
    // Event listeners
    // -----------------------------------------------------------------------

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // -----------------------------------------------------------------------
    // Initialize
    // -----------------------------------------------------------------------

    connect();
  </script>
</body>
</html>
